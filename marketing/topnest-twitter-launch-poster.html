<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Top Nest — Twitter Launch Poster</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;800;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050608;
      font-family: "Rajdhani", "Segoe UI", system-ui, sans-serif;
    }

    .poster {
      width: 1200px;
      height: 675px;
      position: relative;
      overflow: hidden;
      color: #eef2f7;
      background: #06080c;
    }

    /* Cinematic backdrop */
    .sky {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 90% 70% at 50% 115%, rgba(201, 149, 110, 0.42), transparent 58%),
        radial-gradient(ellipse 55% 45% at 18% 18%, rgba(115, 210, 255, 0.22), transparent 62%),
        radial-gradient(ellipse 50% 40% at 82% 22%, rgba(245, 220, 86, 0.14), transparent 58%),
        radial-gradient(ellipse 35% 28% at 50% 48%, rgba(255, 255, 255, 0.06), transparent 70%),
        linear-gradient(180deg, #0a0d14 0%, #06080c 42%, #0b0e15 100%);
    }

    .rays {
      position: absolute;
      inset: -20%;
      background: conic-gradient(
        from 270deg at 50% 58%,
        transparent 0deg,
        rgba(245, 220, 86, 0.07) 18deg,
        transparent 36deg,
        rgba(115, 210, 255, 0.05) 54deg,
        transparent 72deg,
        rgba(201, 149, 110, 0.08) 90deg,
        transparent 108deg,
        rgba(245, 220, 86, 0.06) 126deg,
        transparent 144deg,
        rgba(115, 210, 255, 0.04) 162deg,
        transparent 180deg,
        rgba(201, 149, 110, 0.07) 198deg,
        transparent 216deg,
        rgba(245, 220, 86, 0.05) 234deg,
        transparent 252deg,
        rgba(115, 210, 255, 0.06) 270deg,
        transparent 288deg,
        rgba(201, 149, 110, 0.05) 306deg,
        transparent 324deg,
        rgba(245, 220, 86, 0.04) 342deg,
        transparent 360deg
      );
      mix-blend-mode: screen;
      opacity: 0.85;
      animation: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 20%, transparent 78%);
      opacity: 0.35;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 95% 85% at 50% 50%, transparent 35%, rgba(0, 0, 0, 0.72) 100%);
      pointer-events: none;
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .frame {
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(201, 149, 110, 0.28);
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 42px;
      height: 42px;
      border-color: rgba(245, 220, 86, 0.55);
      border-style: solid;
      pointer-events: none;
    }
    .corner-tl { top: 14px; left: 14px; border-width: 3px 0 0 3px; }
    .corner-tr { top: 14px; right: 14px; border-width: 3px 3px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 3px 3px; }
    .corner-br { bottom: 14px; right: 14px; border-width: 0 3px 3px 0; }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 28px 56px 24px;
      text-align: center;
    }

    .top-bar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .season-tag {
      padding: 6px 14px;
      border: 1px solid rgba(245, 220, 86, 0.45);
      background: rgba(245, 220, 86, 0.08);
      font-family: "Orbitron", sans-serif;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #f5dc56;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(227, 97, 155, 0.12);
      border: 1px solid rgba(227, 97, 155, 0.45);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff8ec4;
    }

    .live-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff4d9a;
      box-shadow: 0 0 12px #ff4d9a;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: -8px;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: 4px;
    }

    .logo-glow {
      position: absolute;
      inset: -30px -40px;
      background: radial-gradient(circle, rgba(245, 220, 86, 0.28), transparent 68%);
      filter: blur(18px);
    }

    .logo {
      position: relative;
      width: 148px;
      height: auto;
      filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.75)) drop-shadow(0 0 24px rgba(245, 220, 86, 0.25));
    }

    .pre-title {
      font-family: "Orbitron", sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: rgba(201, 149, 110, 0.95);
      margin-top: 2px;
    }

    .title {
      font-family: "Orbitron", sans-serif;
      font-size: 78px;
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 0%, #d8dde6 38%, #9aa3b2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: none;
      filter: drop-shadow(0 6px 24px rgba(0, 0, 0, 0.65));
    }

    .title-accent {
      display: block;
      font-size: 86px;
      background: linear-gradient(180deg, #fff6b0 0%, #f5dc56 35%, #c9956e 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 0.06em;
    }

    .subtitle {
      max-width: 720px;
      font-size: 22px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #c8cdd4;
      margin-top: 6px;
    }

    .subtitle em {
      font-style: normal;
      color: #73d2ff;
      font-weight: 700;
    }

    .modes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }

    .mode {
      padding: 8px 16px;
      border-radius: 4px;
      font-family: "Orbitron", sans-serif;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
    }
    .mode-raid { color: #ffd580; border-color: rgba(255, 213, 128, 0.4); box-shadow: inset 0 0 20px rgba(255, 213, 128, 0.08); }
    .mode-dungeon { color: #b89fd0; border-color: rgba(142, 116, 158, 0.45); }
    .mode-pantheon { color: #73d2ff; border-color: rgba(115, 210, 255, 0.45); }
    .mode-commanders { color: #ff8ec4; border-color: rgba(227, 97, 155, 0.45); }

    .bottom {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 20px;
    }

    .prize {
      justify-self: start;
      text-align: left;
    }

    .prize-amount {
      font-family: "Orbitron", sans-serif;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      color: #f5dc56;
      text-shadow: 0 0 24px rgba(245, 220, 86, 0.35);
    }

    .prize-label {
      margin-top: 4px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c9956e;
    }

    .cta-wrap {
      justify-self: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .play-now {
      padding: 14px 42px;
      border-radius: 6px;
      font-family: "Orbitron", sans-serif;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #0a0b0d;
      background: linear-gradient(180deg, #ffe566 0%, #f5dc56 45%, #c9956e 100%);
      border: 2px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        0 0 0 1px rgba(201, 149, 110, 0.5),
        0 8px 32px rgba(245, 220, 86, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .url {
      font-family: "Orbitron", sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #e8ecf0;
    }

    .features {
      justify-self: end;
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.55;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8b95a5;
    }

    .features strong {
      display: block;
      color: #e8ecf0;
      font-size: 14px;
      font-weight: 700;
    }

    .disclaimer {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.22);
      z-index: 3;
    }
  </style>
</head>
<body>
  <article class="poster" id="poster">
    <div class="sky" aria-hidden="true"></div>
    <div class="rays" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <div class="frame" aria-hidden="true"></div>
    <span class="corner corner-tl" aria-hidden="true"></span>
    <span class="corner corner-tr" aria-hidden="true"></span>
    <span class="corner corner-bl" aria-hidden="true"></span>
    <span class="corner corner-br" aria-hidden="true"></span>

    <div class="content">
      <div class="top-bar">
        <span class="season-tag">Season 1</span>
        <span class="live-badge">Live Now</span>
      </div>

      <div class="hero">
        <div class="logo-wrap">
          <div class="logo-glow" aria-hidden="true"></div>
          <img class="logo" src="./topnest-logo.png" alt="Destiny Top Nest logo" />
        </div>
        <p class="pre-title">Destiny's</p>
        <h1 class="title">
          <span class="title-accent">Top Nest</span>
        </h1>
        <p class="subtitle">Season of the Monument Era · <em>Verified clears</em> · <em>Real prizes</em></p>
        <div class="modes">
          <span class="mode mode-raid">Raid</span>
          <span class="mode mode-dungeon">Dungeon</span>
          <span class="mode mode-pantheon">Pantheon</span>
          <span class="mode mode-commanders">Commanders</span>
        </div>
      </div>

      <div class="bottom">
        <div class="prize">
          <div class="prize-amount">$250+</div>
          <div class="prize-label">Prize pool</div>
        </div>
        <div class="cta-wrap">
          <div class="play-now">Play Now</div>
          <div class="url">topnest.app</div>
        </div>
        <div class="features">
          <strong>Link Bungie · Climb boards</strong>
          Fireteams · MVP votes · Trust Rank
        </div>
      </div>
    </div>

    <p class="disclaimer">Fan community · Not affiliated with Bungie</p>
  </article>
</body>
</html>
